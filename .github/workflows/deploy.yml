name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  JEKYLL_ENV: production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install JS dependencies
        run: npm ci

      - name: Build site
        run: |
          set -o pipefail
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          if ! bundle exec jekyll build 2>&1 | tee build.log; then
            echo "::group::Jekyll build tail"
            tail -120 build.log
            echo "::endgroup::"
            grep -Ei "Liquid Exception|Error:|ERROR|Exception|No such file|Could not|Invalid|undefined|unknown|failed" build.log | tail -20 > build-key-errors.log || true
            if [ ! -s build-key-errors.log ]; then
              tail -20 build.log > build-key-errors.log
            fi
            while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\r'/'%0D'}"
              line="${line//$'\n'/'%0A'}"
              echo "::error title=Jekyll build failed::$line"
            done < build-key-errors.log
            exit 1
          fi

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
